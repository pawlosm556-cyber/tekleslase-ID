<!doctype html>
<html lang="am">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TS Premium ID - Final QR Fix</title>
        <script src="https://cdn.tailwindcss.com"></script>
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
        />
        <script
            defer
            src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
        ></script>
        <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

        <style>
            @import url("https://fonts.googleapis.com/css2?family=Noto+Sans+Ethiopic:wght@100..900&display=swap");
            body {
                font-family: "Noto Sans Ethiopic", sans-serif;
                background-color: #020617;
                color: #f8fafc;
            }
            .id-card-modern {
                width: 500px;
                height: 315px;
                background: linear-gradient(145deg, #1e293b 0%, #020617 100%);
                border-radius: 20px;
                position: relative;
                border: 1px solid rgba(251, 191, 36, 0.15);
                overflow: hidden;
                display: flex;
                flex-direction: column;
            }
            .gold-border {
                position: absolute;
                top: 0;
                left: 0;
                right: 0;
                height: 5px;
                background: linear-gradient(90deg, #92400e, #fbbf24, #92400e);
            }
            #qrcode-preview {
                background: white;
                padding: 8px;
                border-radius: 10px;
                display: inline-block;
            }
            /* ድርብርብ QR እንዳይፈጠር መከላከያ */
            #qrcode-preview canvas,
            #qrcode-preview img {
                margin: 0 auto;
            }
        </style>
    </head>
    <body x-data="idApp()" x-init="init()" class="antialiased">
        <div class="container mx-auto p-10 max-w-6xl">
            <div class="grid lg:grid-cols-2 gap-12">
                <section
                    class="bg-slate-900/40 p-8 rounded-3xl border border-white/5 space-y-5"
                >
                    <h2 class="text-amber-500 font-black">የአባል መረጃ</h2>
                    <input
                        type="text"
                        x-model="user.name"
                        @input="updateGraphics"
                        placeholder="ሙሉ ስም"
                        class="w-full bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none focus:ring-2 ring-amber-500"
                    />
                    <div class="grid grid-cols-2 gap-4">
                        <select
                            x-model="user.dept"
                            @change="updateGraphics"
                            class="bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white outline-none"
                        >
                            <option>ትምህርት ክፍል</option>
                            <option>መዝሙር ክፍል</option>
                            <option>ሚድያ ክፍል</option>
                        </select>
                        <input
                            type="text"
                            x-model="user.blood"
                            @input="updateGraphics"
                            placeholder="ደም"
                            class="bg-slate-800 border border-slate-700 p-4 rounded-2xl text-white text-center outline-none"
                        />
                    </div>
                    <input
                        type="file"
                        @change="imageUpload"
                        class="text-xs text-slate-500"
                    />
                    <button
                        @click="processID"
                        class="w-full bg-amber-500 p-5 rounded-2xl font-black text-slate-900 uppercase shadow-lg shadow-amber-500/20"
                    >
                        መዝግብና አውርድ
                    </button>
                </section>

                <div id="capture-area" class="space-y-8">
                    <div class="id-card-modern">
                        <div class="gold-border"></div>
                        <div class="p-6 flex px-8 gap-8 items-center flex-1">
                            <div
                                class="w-28 h-32 rounded-xl overflow-hidden border-2 border-amber-500/30 bg-slate-800 shrink-0"
                            >
                                <img
                                    :src="imagePreview || 'https://via.placeholder.com/150'"
                                    class="w-full h-full object-cover"
                                />
                            </div>
                            <div class="flex-1">
                                <h3
                                    class="text-2xl font-black italic text-white"
                                    x-text="user.name || 'ስም አልተገለጸም'"
                                ></h3>
                                <p
                                    class="text-amber-500 text-sm font-bold mt-1"
                                    x-text="user.dept"
                                ></p>
                                <div class="mt-6 border-t border-white/10 pt-4">
                                    <span
                                        class="text-[10px] font-mono text-slate-400"
                                        x-text="'ID: TS-' + nextID"
                                    ></span>
                                    <svg
                                        id="barcode-img"
                                        class="w-full h-8 mt-1"
                                    ></svg>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div
                        class="id-card-modern p-10 justify-between items-center bg-slate-900"
                    >
                        <div class="flex flex-col items-center gap-4">
                            <div id="qrcode-preview"></div>
                            <div class="text-center">
                                <h4 class="text-amber-500 font-black italic">
                                    DIGITAL PASS
                                </h4>
                                <p
                                    class="text-[10px] text-slate-400 mt-1"
                                    x-text="'ID: TS-' + nextID"
                                ></p>
                            </div>
                        </div>
                        <p
                            class="text-[10px] italic text-slate-500 text-center"
                        >
                            ይህ መታወቂያ የተክለ ሥላሴ ሰንበት ትምህርት ቤት ንብረት ነው።
                        </p>
                    </div>
                </div>
            </div>
        </div>

        <script>
            function idApp() {
                return {
                    imagePreview: null,
                    nextID: "",
                    user: { name: "", dept: "ትምህርት ክፍል", blood: "" },
                    qr: null,

                    generateRandomID() {
                        this.nextID = Math.floor(1000 + Math.random() * 9000);
                    },

                    init() {
                        this.generateRandomID();
                        this.$nextTick(() => {
                            // QR ኮዱን አንድ ጊዜ ብቻ መፍጠር
                            this.qr = new QRCode(
                                document.getElementById("qrcode-preview"),
                                {
                                    width: 100,
                                    height: 100,
                                    colorDark: "#000000",
                                    colorLight: "#ffffff",
                                },
                            );
                            this.updateGraphics();
                        });
                    },

                    updateGraphics() {
                        // አራት ማዕዘን QR - ስም እና መታወቂያ ብቻ የያዘ
                        const qrText = `Name: ${this.user.name || "N/A"} | ID: TS-${this.nextID}`;

                        if (this.qr) {
                            this.qr.clear(); // የቀድሞውን ያጸዳል (ድርብርብ እንዳይሆን)
                            this.qr.makeCode(qrText); // አዲሱን ይተካል
                        }

                        JsBarcode("#barcode-img", `TS-${this.nextID}`, {
                            format: "CODE128",
                            displayValue: false,
                            lineColor: "#fbbf24",
                            background: "transparent",
                            height: 30,
                        });
                    },

                    imageUpload(e) {
                        const reader = new FileReader();
                        reader.onload = (f) =>
                            (this.imagePreview = f.target.result);
                        reader.readAsDataURL(e.target.files[0]);
                    },

                    async processID() {
                        const dbURL =
                            "https://script.google.com/macros/s/AKfycbwPuDUvcXhhznf2cQ77_5bDiI_Uc618qsNlImv84R3U5M15tFQIEnfTFYUiSvqmyEFNbA/exec";
                        const el = document.getElementById("capture-area");
                        const canvas = await html2canvas(el, {
                            scale: 2,
                            backgroundColor: "#020617",
                        });

                        // ወደ ዳታቤዝ መላክ
                        fetch(dbURL, {
                            method: "POST",
                            mode: "no-cors",
                            body: JSON.stringify({
                                id: `TS-${this.nextID}`,
                                name: this.user.name,
                                dept: this.user.dept,
                                blood: this.user.blood || "N/A",
                            }),
                        });

                        const link = document.createElement("a");
                        link.download = `ID_${this.user.name}.png`;
                        link.href = canvas.toDataURL();
                        link.click();

                        this.generateRandomID();
                        this.updateGraphics();
                    },
                };
            }
        </script>
    </body>
</html>
